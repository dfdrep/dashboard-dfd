<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard DFD Representações</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a2e'/%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234a2080'/%3E%3Cstop offset='100%25' stop-color='%231a1a2e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='32' y='43' font-family='Arial Black,Arial,sans-serif' font-weight='900' font-size='22' fill='white' text-anchor='middle' letter-spacing='1'%3EDFD%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --surface: #16162a;
    --surface-2: #1e1e35;
    --text: #e8e6f0;
    --text-2: #9b98b8;
    --text-3: #5c5a78;
    --border: rgba(139,120,255,0.12);
    --border-2: rgba(139,120,255,0.22);
    --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
    --accent: #7c5cfc;
    --accent-2: #9b7ffe;
    --green: #2dd4a0; --green-bg: rgba(45,212,160,0.15);
    --blue: #5ba3f5; --blue-bg: rgba(91,163,245,0.15);
    --amber: #f5a623; --amber-bg: rgba(245,166,35,0.15);
    --red: #f56565; --red-bg: rgba(245,101,101,0.15);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
  body::before { content:''; position:fixed; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); z-index:999; }
  .container { max-width: 960px; margin: 0 auto; }

  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); margin-bottom: 1.25rem; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.online { background: var(--accent); }
  .status-dot.syncing { background: #EF9F27; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 22px; font-weight: 500; background: linear-gradient(135deg, #e8e6f0 30%, var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-sub { font-size: 13px; color: var(--text-2); margin-top: 3px; }
  .header-right { font-size: 13px; color: var(--text-2); }

  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  #metrics-ped { grid-template-columns: repeat(5, minmax(0,1fr)); }
  @media (max-width: 700px) { #metrics-ped { grid-template-columns: repeat(3, 1fr); } }
  .metrics-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  @media (max-width: 580px) { .metrics { grid-template-columns: repeat(2,1fr); } .metrics-3 { grid-template-columns: repeat(2,1fr); } }
  .metric { background: var(--surface-2); border-radius: var(--radius-md); padding: 12px 14px; border: 0.5px solid var(--border); transition: border-color 0.2s; }
  .metric:hover { border-color: rgba(139,120,255,0.35); }
  .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 3px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .metric-sub { font-size: 11px; margin-top: 2px; color: var(--text-2); }

  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; }
  .tab { font-size: 13px; font-weight: 500; padding: 9px 18px; cursor: pointer; color: var(--text-2); border-bottom: 2px solid transparent; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .tab.active { color: var(--accent-2); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--accent-2); background: var(--surface-2); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .panel-header { border-bottom: 0.5px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1rem; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .panel-title { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
  .panel-title i { color: var(--text-2); font-size: 16px; }
  .add-btn { font-size: 12px; color: var(--text-2); cursor: pointer; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 12px; background: transparent; font-family: inherit; transition: background 0.15s; }
  .add-btn:hover { background: var(--surface-2); }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .b-red  { background: var(--red-bg);   color: var(--red); }
  .b-amb  { background: var(--amber-bg); color: var(--amber); }
  .b-grn  { background: var(--green-bg); color: var(--green); }
  .b-blue { background: var(--blue-bg);  color: var(--blue); }
  .b-gray { background: var(--surface-2); color: var(--text-2); }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-2); flex-shrink: 0; }

  .group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); padding: 8px 0 4px; border-bottom: 0.5px solid var(--border); }
  .group-label:first-child { padding-top: 0; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .item:last-child { border-bottom: none; padding-bottom: 0; }
  .item:first-child { padding-top: 0; }
  .checkbox { width: 17px; height: 17px; min-width: 17px; border-radius: 4px; border: 1.5px solid var(--border-2); margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; cursor: pointer; }
  .checkbox.done { background: var(--accent); border-color: var(--accent); }
  .checkbox.done i { font-size: 10px; color: #fff; }
  .item-body { flex: 1; min-width: 0; cursor: pointer; }
  .item-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .item-title.done { text-decoration: line-through; color: var(--text-3); }
  .item-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 15px; padding: 4px 5px; border-radius: 4px; font-family: inherit; transition: all 0.15s; }
  .icon-btn:hover { color: var(--text); background: var(--surface-2); }
  .icon-btn.del:hover { color: var(--red); background: var(--red-bg); }

  .order-item { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .order-item:last-child { border-bottom: none; padding-bottom: 0; }
  .order-item:first-child { padding-top: 0; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .order-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .order-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .order-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
  .info-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: var(--radius-md); font-size: 11px; font-weight: 500; }
  .chip i { font-size: 12px; }
  .chip-blue  { background: var(--blue-bg);  color: var(--blue); }
  .chip-green { background: var(--green-bg); color: var(--green); }
  .chip-red   { background: var(--red-bg);   color: var(--red); }
  .steps { display: flex; gap: 3px; margin-top: 7px; }
  .step { height: 3px; border-radius: 99px; flex: 1; }
  .step.done { background: #1D9E75; }
  .step.act  { background: #378ADD; }
  .step.pend { background: var(--surface-2); border: 0.5px solid var(--border); }
  .steps-labels { display: flex; gap: 3px; margin-top: 3px; }
  .step-lbl { flex: 1; font-size: 9px; color: var(--text-3); text-align: center; line-height: 1.3; }
  .step-lbl.active { color: #378ADD; font-weight: 500; }
  .step-lbl.done-lbl { color: #1D9E75; }
  .order-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; flex-wrap: wrap; gap: 6px; }
  .step-next { font-size: 11px; color: var(--text-2); }
  .advance-btn { font-size: 11px; padding: 4px 10px; border: 0.5px solid var(--border-2); border-radius: var(--radius-md); background: transparent; cursor: pointer; color: var(--accent-2); font-family: inherit; transition: all 0.15s; }
  .advance-btn:hover { background: rgba(124,92,252,0.12); border-color: var(--accent); }

  .nf-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .nf-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); padding: 6px 10px; border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap; }
  .nf-table td { padding: 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .nf-table tr:last-child td { border-bottom: none; }
  .nf-table tr:hover td { background: var(--surface-2); }
  .si { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; }
  .si-ok   { background: var(--green-bg); color: var(--green); }
  .si-no   { background: var(--red-bg);   color: var(--red); }
  .si-pend { background: var(--amber-bg); color: var(--amber); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: var(--radius-xl); padding: 1.5rem; width: 100%; max-width: 460px; border: 0.5px solid rgba(139,120,255,0.3); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 10px; border: 0.5px solid var(--border-2); border-radius: var(--radius-md); font-size: 13px; background: var(--surface-2); color: var(--text); font-family: inherit; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: #378ADD; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel { padding: 8px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border-2); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-2); font-family: inherit; }
  .btn-cancel:hover { background: var(--surface-2); }
  .btn-save { padding: 8px 16px; border-radius: var(--radius-md); border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }
  .empty { text-align: center; padding: 2rem 0; color: var(--text-3); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .empty i { font-size: 28px; opacity: 0.3; }
  .date-field { display: none; }
  .date-field.show { display: block; }
  .loading { text-align: center; padding: 2rem 0; color: var(--text-3); font-size: 13px; }
  .metric { cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .metric:hover { border-color: rgba(139,120,255,0.5) !important; transform: translateY(-1px); }
  .metric.active-filter { border-color: var(--accent) !important; box-shadow: 0 0 0 1px var(--accent); }
  .filter-bar { display: none; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; color: var(--accent-2); }
  .filter-bar.show { display: flex; }
  .filter-clear { background: none; border: 0.5px solid var(--accent); border-radius: 99px; color: var(--accent-2); font-size: 11px; padding: 2px 10px; cursor: pointer; font-family: inherit; }
  .filter-clear:hover { background: rgba(124,92,252,0.15); }
</style>
</head>
<body>

<!-- Modal Pendência -->
<div class="modal-overlay hidden" id="modal-pendencia">
  <div class="modal">
    <h2 id="modal-pend-title">Nova pendência</h2>
    <div class="form-group"><label>Descrição</label><input type="text" id="p-titulo" placeholder="O que precisa ser feito?" /></div>
    <div class="form-row">
      <div class="form-group"><label>Fornecedor</label><select id="p-forn"><option value="">— Nenhum —</option></select></div>
      <div class="form-group"><label>Cliente / Atacadista</label><select id="p-cliente"><option value="">— Nenhum —</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Prazo</label><input type="text" id="p-prazo" placeholder="Ex: Hoje, Amanhã" /></div>
      <div class="form-group"><label>Responsável</label><input type="text" id="p-resp" placeholder="Nome (opcional)" /></div>
    </div>
    <div class="form-group"><label>Prioridade</label>
      <select id="p-prio"><option value="high">Urgente</option><option value="med" selected>Média</option><option value="low">Baixa</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-pendencia')">Cancelar</button>
      <button class="btn-save" id="btn-save-pend" onclick="savePendencia()">Adicionar</button>
    </div>
  </div>
</div>

<!-- Modal Pedido -->
<div class="modal-overlay hidden" id="modal-pedido">
  <div class="modal">
    <h2 id="modal-ped-title">Novo pedido</h2>
    <div class="form-group"><label>Descrição do pedido</label><input type="text" id="o-nome" placeholder="Ex: Queijo Mineirinho 500g — caixa 12un" /></div>
    <div class="form-row">
      <div class="form-group"><label>Fornecedor</label><select id="o-forn"><option value="">— Selecione —</option></select></div>
      <div class="form-group"><label>Cliente / Atacadista</label><select id="o-cliente"><option value="">— Selecione —</option></select></div>
    </div>
    <div class="form-group"><label>Status atual</label>
      <select id="o-etapa" onchange="toggleDateFields()">
        <option value="0">Não faturado</option>
        <option value="1">Precisa agendar</option>
        <option value="2">Foi agendado</option>
        <option value="3">Foi entregue</option>
      </select>
    </div>
    <div class="form-group date-field" id="field-fat"><label>Data de faturamento</label><input type="date" id="o-fat" /></div>
    <div class="form-group date-field" id="field-agd"><label>Data de agendamento</label><input type="date" id="o-agd" /></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-pedido')">Cancelar</button>
      <button class="btn-save" id="btn-save-ped" onclick="savePedido()">Adicionar</button>
    </div>
  </div>
</div>

<!-- Modal NF -->
<div class="modal-overlay hidden" id="modal-nf">
  <div class="modal">
    <h2 id="modal-nf-title">Nova nota fiscal de comissão</h2>
    <div class="form-group"><label>Fornecedor</label><select id="nf-forn"><option value="">— Selecione —</option></select></div>
    <div class="form-group"><label>Prazo de envio</label><input type="date" id="nf-prazo" /></div>
    <div class="form-row">
      <div class="form-group"><label>NF emitida?</label><select id="nf-emitida"><option value="nao">Não</option><option value="sim">Sim</option></select></div>
      <div class="form-group"><label>NF enviada?</label><select id="nf-enviada"><option value="nao">Não</option><option value="sim">Sim</option></select></div>
    </div>
    <div class="form-group"><label>Comissão recebida?</label>
      <select id="nf-comissao"><option value="nao">Não</option><option value="aguardando">Aguardando</option><option value="sim">Sim</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-nf')">Cancelar</button>
      <button class="btn-save" id="btn-save-nf" onclick="saveNF()">Adicionar</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Conectando...</span>
  </div>
  <div class="header">
    <div>
      <h1>DFD Representações</h1>
      <div class="header-sub" id="data-hoje"></div>
    </div>
    <div class="header-right" id="hora-atual"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pendencias')"><i class="ti ti-alert-circle" aria-hidden="true"></i> Pendências</button>
    <button class="tab" onclick="switchTab('pedidos')"><i class="ti ti-package" aria-hidden="true"></i> Pedidos</button>
    <button class="tab" onclick="switchTab('notas')"><i class="ti ti-file-invoice" aria-hidden="true"></i> Notas Fiscais de comissão</button>
  </div>

  <div class="tab-content active" id="tab-pendencias">
    <div class="metrics" id="metrics-pend"></div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ti ti-alert-circle" aria-hidden="true"></i> Pendências do dia</div>
        <button class="add-btn" onclick="openNewPendencia()">+ Adicionar</button>
      </div>
      <div id="lista-pendencias"><div class="loading">Carregando...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-pedidos">
    <div class="metrics" id="metrics-ped"></div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ti ti-package" aria-hidden="true"></i> Pedidos acompanhados</div>
        <button class="add-btn" onclick="openNewPedido()">+ Adicionar</button>
      </div>
      <div id="lista-pedidos"><div class="loading">Carregando...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-notas">
    <div class="metrics-3" id="metrics-nf"></div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ti ti-file-invoice" aria-hidden="true"></i> Notas Fiscais de comissão</div>
        <button class="add-btn" onclick="openNewNF()">+ Adicionar NF</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="nf-table">
          <thead><tr><th>Fornecedor</th><th>Prazo envio</th><th>NF emitida</th><th>NF enviada</th><th>Comissão recebida</th><th></th></tr></thead>
          <tbody id="lista-nf"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2wVhNsMBdlyXtXzkWAQlyS0uObJrKIYs",
  authDomain: "dashboarddfd.firebaseapp.com",
  databaseURL: "https://dashboarddfd-default-rtdb.firebaseio.com",
  projectId: "dashboarddfd",
  storageBucket: "dashboarddfd.firebasestorage.app",
  messagingSenderId: "936485615978",
  appId: "1:936485615978:web:7cc8fcd9968ff048884d13"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const FORNECEDORES = [
  'Agroindústria Real','Asa','Fugini Alimentos','Gaboardi','Global','Globopack',
  'Godinho','Infinity','JPS','Master','Mundial','Nossa Distribuidora','Oderich',
  'RTL','Superglobo'
];
const CLIENTES = [
  'Asa','Atacaforte','Estampa','Flex','G10','Global','Godinho','Infinity',
  'JM','JPS','Master','MegaMinas','Multimix','Mundial','Nossa Distribuidora',
  'Real','RTL','Somamix','Única','Upside'
];
const ETAPA_LABELS = ['Não faturado','Precisa agendar','Foi agendado','Foi entregue'];
const PRIO_ORDER   = { high:0, med:1, low:2 };

let pendencias = {}, pedidos = {}, notas = {};
let editingPendKey = null, editingPedKey = null, editingNfKey = null;
let filterPend = null; // 'urgent' | 'concluidas' | 'hoje' | 'abertas'
let filterPed  = null; // 'naoFat' | 'aguardAgend' | 'agendados' | 'total'
let filterNF   = null; // 'emitidas' | 'pendEmit' | 'comReceb'

// Status de conexão
onValue(ref(db, '.info/connected'), snap => {
  const online = snap.val();
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (online ? 'online' : '');
  txt.textContent = online ? 'Sincronizado em tempo real' : 'Reconectando...';
});

onValue(ref(db, 'pendencias'), snap => { pendencias = snap.val() || {}; renderPendencias(); });
onValue(ref(db, 'pedidos'),    snap => { pedidos    = snap.val() || {}; renderPedidos(); });

// Selects
function fillSelects() {
  ['p-forn','o-forn','nf-forn'].forEach(id => {
    const el = document.getElementById(id), cur = el.value;
    el.innerHTML = '<option value="">— Selecione —</option>' + FORNECEDORES.map(f=>`<option value="${f}">${f}</option>`).join('');
    el.value = cur;
  });
  ['p-cliente','o-cliente'].forEach(id => {
    const el = document.getElementById(id), cur = el.value;
    el.innerHTML = '<option value="">— Selecione —</option>' + CLIENTES.map(c=>`<option value="${c}">${c}</option>`).join('');
    el.value = cur;
  });
}

// Abas
window.switchTab = function(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  ['pendencias','pedidos','notas'].forEach((n,i) => { if(n===id) document.querySelectorAll('.tab')[i].classList.add('active'); });
};

// Modais
window.closeModal = function(id) {
  document.getElementById(id).classList.add('hidden');
  document.getElementById(id).querySelectorAll('input').forEach(i => i.value='');
  document.getElementById(id).querySelectorAll('select').forEach(s => s.selectedIndex=0);
  document.querySelectorAll('.date-field').forEach(d => d.classList.remove('show'));
  editingPendKey = null; editingPedKey = null; editingNfKey = null;
};
function openModal(id) {
  fillSelects();
  document.getElementById(id).classList.remove('hidden');
  setTimeout(() => { const f = document.querySelector('#'+id+' input'); if(f) f.focus(); }, 50);
}
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) window.closeModal(o.id); }));
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(o => window.closeModal(o.id)); });

window.toggleDateFields = function() {
  const v = Number(document.getElementById('o-etapa').value);
  document.getElementById('field-fat').classList.toggle('show', v>=1);
  document.getElementById('field-agd').classList.toggle('show', v>=2);
};

// ── HELPERS ──
function toInputDate(d) {
  if(!d) return '';
  if(d.includes('-')) return d;
  const [dd,mm,yy] = d.split('/');
  return `${yy}-${mm}-${dd}`;
}
function fmtDate(d) {
  if(!d) return '';
  if(d.includes('-')) { const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
  return d;
}
function prazoColor(d) {
  if(!d) return 'b-gray';
  const today = new Date(); today.setHours(0,0,0,0);
  let dt;
  if(d.includes('-')) dt=new Date(d);
  else { const [dd,mm,yy]=d.split('/'); dt=new Date(`${yy}-${mm}-${dd}`); }
  const diff=(dt-today)/(1000*60*60*24);
  if(diff<=0) return 'b-red';
  if(diff<=7) return 'b-amb';
  return 'b-grn';
}
function prioBadge(p) {
  if(p==='high') return '<span class="badge b-red">Urgente</span>';
  if(p==='med')  return '<span class="badge b-amb">Média</span>';
  return '<span class="badge b-gray">Baixa</span>';
}
function etapaBadge(e) {
  return `<span class="badge ${['b-gray','b-amb','b-blue','b-grn'][e]}">${ETAPA_LABELS[e]}</span>`;
}
function stepCls(i,e) { return i<e?'done':i===e?'act':'pend'; }
function siIcon(v) {
  if(v==='sim')        return '<span class="si si-ok"><i class="ti ti-check" style="font-size:11px"></i></span>';
  if(v==='aguardando') return '<span class="si si-pend"><i class="ti ti-clock" style="font-size:11px"></i></span>';
  return '<span class="si si-no"><i class="ti ti-x" style="font-size:11px"></i></span>';
}

// ── RENDERS ──
function renderPendencias() {
  const el = document.getElementById('lista-pendencias');
  let entries = Object.entries(pendencias);
  // Aplicar filtro
  if(filterPend==='abertas')   entries = entries.filter(([,p])=>!p.done);
  if(filterPend==='concluidas') entries = entries.filter(([,p])=>p.done);
  if(filterPend==='hoje')      entries = entries.filter(([,p])=>!p.done&&p.prazo&&p.prazo.toLowerCase().includes('hoje'));
  if(filterPend==='taxa')      entries = entries.filter(([,p])=>p.done);
  if(!entries.length) {
    el.innerHTML='<div class="empty"><i class="ti ti-clipboard-list"></i>Nenhuma pendência ainda.<br>Clique em "+ Adicionar".</div>'; 
  } else {
    const sorted = entries.sort((a,b) => {
      if(a[1].done!==b[1].done) return a[1].done?1:-1;
      return (PRIO_ORDER[a[1].prioridade]??2)-(PRIO_ORDER[b[1].prioridade]??2);
    });
    const groups = [
      { label:'🔴 Urgente',    items: sorted.filter(([,p])=>!p.done&&p.prioridade==='high') },
      { label:'🟡 Média',      items: sorted.filter(([,p])=>!p.done&&p.prioridade==='med') },
      { label:'🟢 Baixa',      items: sorted.filter(([,p])=>!p.done&&p.prioridade==='low') },
      { label:'✓ Concluídas', items: sorted.filter(([,p])=>p.done) },
    ].filter(g=>g.items.length>0);
    el.innerHTML = groups.map(g=>`
      <div class="group-label">${g.label}</div>
      ${g.items.map(([key,p])=>`
        <div class="item">
          <div class="checkbox ${p.done?'done':''}" onclick="toggleDone('${key}')">
            ${p.done?'<i class="ti ti-check"></i>':''}
          </div>
          <div class="item-body" onclick="toggleDone('${key}')">
            <div class="item-title ${p.done?'done':''}">${p.titulo}</div>
            <div class="item-meta">
              ${prioBadge(p.prioridade)}
              ${p.fornecedor?`<span class="dot"></span><i class="ti ti-building-store" style="font-size:11px"></i> ${p.fornecedor}`:''}
              ${p.cliente?`<span class="dot"></span><i class="ti ti-users" style="font-size:11px"></i> ${p.cliente}`:''}
              ${p.prazo?`<span class="dot"></span><i class="ti ti-clock" style="font-size:11px"></i> ${p.prazo}`:''}
              ${p.responsavel?`<span class="dot"></span><i class="ti ti-user" style="font-size:11px"></i> ${p.responsavel}`:''}
            </div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="openEditPendencia('${key}')" title="Editar"><i class="ti ti-edit"></i></button>
            <button class="icon-btn del" onclick="deletePendencia('${key}')" title="Remover"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      `).join('')}
    `).join('');
  }
  const pArr=Object.values(pendencias);
  const abertas=pArr.filter(p=>!p.done).length, concluidas=pArr.filter(p=>p.done).length;
  const urgentes=pArr.filter(p=>!p.done&&p.prioridade==='high').length, total=pArr.length;
  const taxa=total?Math.round((concluidas/total)*100):0;
  const hoje=pArr.filter(p=>!p.done&&p.prazo&&p.prazo.toLowerCase().includes('hoje')).length;
  document.getElementById('metrics-pend').innerHTML=`
    <div class="metric ${filterPend==='abertas'?'active-filter':''}" onclick="toggleFilterPend('abertas')"><div class="metric-label">Abertas</div><div class="metric-value">${abertas}</div><div class="metric-sub" style="color:var(--red)">${urgentes} urgente(s)</div></div>
    <div class="metric ${filterPend==='concluidas'?'active-filter':''}" onclick="toggleFilterPend('concluidas')"><div class="metric-label">Concluídas</div><div class="metric-value">${concluidas}</div><div class="metric-sub" style="color:var(--green)">${concluidas}/${total} total</div></div>
    <div class="metric ${filterPend==='taxa'?'active-filter':''}" onclick="toggleFilterPend('taxa')"><div class="metric-label">Taxa de conclusão</div><div class="metric-value">${taxa}%</div><div class="metric-sub">${taxa>=50?'Bom progresso':'Em andamento'}</div></div>
    <div class="metric ${filterPend==='hoje'?'active-filter':''}" onclick="toggleFilterPend('hoje')"><div class="metric-label">Vence hoje</div><div class="metric-value">${hoje}</div><div class="metric-sub" style="color:${hoje>0?'var(--red)':'var(--text-2)'}">${hoje>0?'Atenção':'Ok'}</div></div>
  `;
}

function renderPedidos() {
  const el = document.getElementById('lista-pedidos');
  let entriesPed = Object.entries(pedidos).sort((a,b)=>(a[1].criadoEm||0)-(b[1].criadoEm||0));
  if(filterPed==='naoFat')      entriesPed = entriesPed.filter(([,p])=>p.etapa===0);
  if(filterPed==='aguardAgend') entriesPed = entriesPed.filter(([,p])=>p.etapa===1);
  if(filterPed==='agendados') {
    entriesPed = entriesPed.filter(([,p])=>p.etapa===2);
    entriesPed = entriesPed.sort((a,b)=>{
      const toMs = d => {
        if(!d) return Infinity;
        if(d.includes('-')) return new Date(d).getTime();
        const [dd,mm,yy] = d.split('/'); return new Date(`${yy}-${mm}-${dd}`).getTime();
      };
      return toMs(a[1].dataAgendamento) - toMs(b[1].dataAgendamento);
    });
  }
  if(filterPed==='entregues')  entriesPed = entriesPed.filter(([,p])=>p.etapa===3);
  const entries = entriesPed;
  if(!entries.length) {
    el.innerHTML='<div class="empty"><i class="ti ti-package"></i>Nenhum pedido ainda.<br>Clique em "+ Adicionar".</div>';
  } else {
    el.innerHTML = entries.map(([key,p])=>`
      <div class="order-item">
        <div class="order-top">
          <div>
            <div class="order-name">${p.nome}</div>
            <div class="order-meta">
              ${p.fornecedor?`<i class="ti ti-building-store" style="font-size:11px"></i> ${p.fornecedor}`:''}
              ${p.fornecedor&&p.cliente?'<span class="dot"></span>':''}
              ${p.cliente?`<i class="ti ti-users" style="font-size:11px"></i> ${p.cliente}`:''}
            </div>
          </div>
          <div class="order-actions">
            ${etapaBadge(p.etapa||0)}
            <button class="icon-btn" onclick="openEditPedido('${key}')" title="Editar"><i class="ti ti-edit"></i></button>
            <button class="icon-btn del" onclick="deletePedido('${key}')" title="Remover"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="info-row">
          ${p.dataFaturamento
            ?`<div class="chip chip-green"><i class="ti ti-receipt"></i> Faturado em: ${fmtDate(p.dataFaturamento)}</div>`
            :(p.etapa===0?'<div class="chip chip-red"><i class="ti ti-receipt-off"></i> Faturamento pendente</div>':'')}
          ${p.dataAgendamento?`<div class="chip chip-blue"><i class="ti ti-calendar-event"></i> Agendado para: ${fmtDate(p.dataAgendamento)}</div>`:''}
        </div>
        <div class="steps">${[0,1,2,3].map(i=>`<div class="step ${stepCls(i,p.etapa||0)}"></div>`).join('')}</div>
        <div class="steps-labels">
          ${['Faturamento','Agendamento','Agendado','Entregue'].map((l,i)=>`<div class="step-lbl ${i<(p.etapa||0)?'done-lbl':i===(p.etapa||0)?'active':''}">${l}</div>`).join('')}
        </div>
        <div class="order-footer">
          <div class="step-next">${(p.etapa||0)<3?'Próximo: '+ETAPA_LABELS[(p.etapa||0)+1]:'✓ Concluído'}</div>
          ${(p.etapa||0)<3?`<button class="advance-btn" onclick="advancePedido('${key}')">Avançar →</button>`:''}
        </div>
      </div>
    `).join('');
  }
  const oArr=Object.values(pedidos);
  const total=oArr.length, naoFat=oArr.filter(p=>p.etapa===0).length;
  const aguardAgend=oArr.filter(p=>p.etapa===1).length;
  const agendados=oArr.filter(p=>p.etapa===2).length;
  const entregues=oArr.filter(p=>p.etapa===3).length;
  document.getElementById('metrics-ped').innerHTML=`
    <div class="metric ${filterPed==='total'?'active-filter':''}" onclick="toggleFilterPed('total')"><div class="metric-label">Total de pedidos</div><div class="metric-value">${total}</div><div class="metric-sub">em acompanhamento</div></div>
    <div class="metric ${filterPed==='naoFat'?'active-filter':''}" onclick="toggleFilterPed('naoFat')"><div class="metric-label">Não faturados</div><div class="metric-value">${naoFat}</div><div class="metric-sub" style="color:${naoFat>0?'var(--red)':'var(--text-2)'}">${naoFat>0?'Pendente':'Ok'}</div></div>
    <div class="metric ${filterPed==='aguardAgend'?'active-filter':''}" onclick="toggleFilterPed('aguardAgend')"><div class="metric-label">Aguardando agendamento</div><div class="metric-value">${aguardAgend}</div><div class="metric-sub" style="color:var(--amber)">${aguardAgend} pedido(s)</div></div>
    <div class="metric ${filterPed==='agendados'?'active-filter':''}" onclick="toggleFilterPed('agendados')"><div class="metric-label">Aguardando entrega</div><div class="metric-value">${agendados}</div><div class="metric-sub" style="color:var(--blue)">${agendados} agendado(s)</div></div>
    <div class="metric ${filterPed==='entregues'?'active-filter':''}" onclick="toggleFilterPed('entregues')"><div class="metric-label">Concluídos</div><div class="metric-value">${entregues}</div><div class="metric-sub" style="color:var(--green)">${entregues} entregue(s)</div></div>

function renderNotas() {

  if(filterNF==='emitidas')  entriesNF = entriesNF.filter(([,n])=>n.emitida==='sim');
  if(filterNF==='pendEmit')  entriesNF = entriesNF.filter(([,n])=>n.emitida!=='sim');
  if(filterNF==='comReceb')  entriesNF = entriesNF.filter(([,n])=>n.comissao==='sim');
  const entries = entriesNF;
  if(!entries.length) {
    tb.innerHTML=`<tr><td colspan="6"><div class="empty"><i class="ti ti-file-invoice"></i>Nenhuma NF cadastrada.<br>Clique em "+ Adicionar NF".</div></td></tr>`;
  } else {
    tb.innerHTML=entries.map(([key,n])=>`
      <tr>
        <td><strong>${n.fornecedor}</strong></td>
        <td><span class="badge ${prazoColor(n.prazo)}">${fmtDate(n.prazo)||'—'}</span></td>

        <td>${siIcon(n.enviada)}</td>
        <td>${siIcon(n.comissao)}</td>

        </div></td>
      </tr>
    `).join('');
  }
  const nArr=Object.values(notas);
  const emitidas=nArr.filter(n=>n.emitida==='sim').length, pendEmit=nArr.filter(n=>n.emitida!=='sim').length;
  const comReceb=nArr.filter(n=>n.comissao==='sim').length;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const vencem=nArr.filter(n=>{
    if(!n.prazo||n.emitida==='sim') return false;
    let dt; if(n.prazo.includes('-')) dt=new Date(n.prazo); else { const [d,m,y]=n.prazo.split('/'); dt=new Date(`${y}-${m}-${d}`); }
    return dt<=hoje;
  }).length;
  document.getElementById('metrics-nf').innerHTML=`
    <div class="metric ${filterNF==='emitidas'?'active-filter':''}" onclick="toggleFilterNF('emitidas')"><div class="metric-label">NFs emitidas</div><div class="metric-value">${emitidas}</div><div class="metric-sub">de ${nArr.length} no período</div></div>
    <div class="metric ${filterNF==='pendEmit'?'active-filter':''}" onclick="toggleFilterNF('pendEmit')"><div class="metric-label">Aguardando emissão</div><div class="metric-value">${pendEmit}</div><div class="metric-sub" style="color:${vencem>0?'var(--red)':'var(--text-2)'}">${vencem>0?vencem+' vence(m) hoje':'Em dia'}</div></div>
    <div class="metric ${filterNF==='comReceb'?'active-filter':''}" onclick="toggleFilterNF('comReceb')"><div class="metric-label">Comissões recebidas</div><div class="metric-value">${comReceb}</div><div class="metric-sub" style="color:var(--amber)">${nArr.length-comReceb} aguardando</div></div>
  `;
}

  filterPend = filterPend===f ? null : f;
  renderPendencias();
};
window.toggleFilterPed = function(f) {
  filterPed = filterPed===f ? null : f;
  renderPedidos();
};
window.toggleFilterNF = function(f) {
  filterNF = filterNF===f ? null : f;
  renderNotas();
};
function updateTime() {
  const now=new Date();
  const dias=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('data-hoje').textContent=dias[now.getDay()]+', '+now.getDate()+' de '+meses[now.getMonth()]+' de '+now.getFullYear();
  document.getElementById('hora-atual').textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
updateTime();
setInterval(updateTime,30000);
</script>
